<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gravador de Vídeo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    padding: 20px;
  }

  h1 {
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 20px;
    color: #ccc;
    text-transform: uppercase;
  }

  #preview-wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 9/16;
    background: #1a1a1a;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    margin-bottom: 24px;
  }

  #preview {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    background: #000;
  }

  #rec-indicator {
    display: none;
    position: absolute;
    top: 14px; left: 14px;
    background: rgba(0,0,0,0.55);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.8rem;
    font-weight: 700;
    align-items: center;
    gap: 7px;
  }
  #rec-indicator.active { display: flex; }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff3b30;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #timer { font-variant-numeric: tabular-nums; }

  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 420px;
  }

  button {
    flex: 1;
    padding: 15px 6px;
    border: none;
    border-radius: 50px;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.95); }

  #btn-camera {
    background: linear-gradient(135deg, #0a84ff, #0055cc);
    color: #fff;
  }
  #btn-camera:disabled { background: #2a2a2a; color: #555; }

  #btn-record {
    background: linear-gradient(135deg, #ff3b30, #c0392b);
    color: #fff;
  }
  #btn-record.recording { background: linear-gradient(135deg, #555, #333); }
  #btn-record:disabled  { background: #2a2a2a; color: #555; }

  #btn-save {
    background: linear-gradient(135deg, #30d158, #1a8a3a);
    color: #fff;
    display: none;
  }

  #status {
    margin-top: 16px;
    font-size: 0.82rem;
    color: #888;
    text-align: center;
    min-height: 18px;
    padding: 0 8px;
    line-height: 1.4;
  }

  /* ── Overlay ── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 100;
    padding: 32px 24px;
    text-align: center;
  }
  #overlay h2  { font-size: 1.3rem; }
  #overlay p   { font-size: 0.88rem; color: #aaa; line-height: 1.6; }
  #overlay .icon { font-size: 3rem; }

  #btn-allow {
    background: linear-gradient(135deg, #0a84ff, #0055cc);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 15px 40px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    flex: none;
    width: auto;
    -webkit-tap-highlight-color: transparent;
  }

  #overlay-error {
    color: #ff6b6b;
    font-size: 0.85rem;
    display: none;
    line-height: 1.5;
  }
</style>
</head>
<body>

<h1>🎬 Gravador de Vídeo</h1>

<div id="preview-wrap">
  <video id="preview" autoplay playsinline muted></video>
  <div id="rec-indicator"><div class="dot"></div><span id="timer">00:00</span></div>
</div>

<div class="btn-row">
  <button id="btn-camera" disabled>📷 Frontal</button>
  <button id="btn-record" disabled>⏺ Gravar</button>
  <button id="btn-save">💾 Salvar</button>
</div>

<p id="status"></p>

<div id="overlay">
  <div class="icon">🎥</div>
  <h2>Gravador de Vídeo</h2>
  <p>Toque no botão abaixo para liberar o acesso à câmera e ao microfone.<br>O navegador irá pedir sua confirmação.</p>
  <button id="btn-allow">📷 Liberar câmera e microfone</button>
  <p id="overlay-error"></p>
</div>

<script>
(function () {
  'use strict';

  const preview      = document.getElementById('preview');
  const btnCamera    = document.getElementById('btn-camera');
  const btnRecord    = document.getElementById('btn-record');
  const btnSave      = document.getElementById('btn-save');
  const recInd       = document.getElementById('rec-indicator');
  const timerEl      = document.getElementById('timer');
  const statusEl     = document.getElementById('status');
  const overlay      = document.getElementById('overlay');
  const btnAllow     = document.getElementById('btn-allow');
  const overlayError = document.getElementById('overlay-error');

  let stream = null;
  let mediaRecorder = null;
  let chunks = [];
  let recording = false;
  let timerInterval = null;
  let elapsed = 0;
  let lastBlob = null;
  let facingMode = 'user'; // frontal por padrão

  /* ── Utilitários ──────────────────────────────────────────── */
  function setStatus(msg) { statusEl.textContent = msg; }

  function showError(msg) {
    overlayError.textContent = msg;
    overlayError.style.display = 'block';
  }

  function hideError() {
    overlayError.textContent = '';
    overlayError.style.display = 'none';
  }

  function errMsg(err) {
    if (!err) return 'Erro desconhecido.';
    switch (err.name) {
      case 'NotAllowedError':
      case 'PermissionDeniedError':
        return '⛔ Permissão negada. Vá em Configurações do Chrome > Permissões do site e libere Câmera e Microfone.';
      case 'NotFoundError':
      case 'DevicesNotFoundError':
        return '❌ Câmera ou microfone não encontrado neste dispositivo.';
      case 'NotReadableError':
      case 'TrackStartError':
        return '⚠️ Câmera em uso por outro aplicativo. Feche-o e tente novamente.';
      case 'OverconstrainedError':
        return '⚠️ Câmera solicitada não disponível. Tente alternar.';
      default:
        return `Erro: ${err.name} — ${err.message}`;
    }
  }

  /* ── Obter stream com fallback ────────────────────────────── */
  async function getStream(facing) {
    // Tenta com facingMode exato
    try {
      return await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: facing }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: true
      });
    } catch (_) { /* tenta sem exact */ }

    // Fallback: facingMode sem exact
    try {
      return await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: true
      });
    } catch (_) { /* tenta sem restrição de câmera */ }

    // Último recurso: qualquer câmera
    return await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  }

  /* ── Iniciar câmera ───────────────────────────────────────── */
  async function initCamera(facing) {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }

    try {
      stream = await getStream(facing);
      preview.srcObject = stream;
      await preview.play().catch(() => {});
      btnRecord.disabled = false;
      btnCamera.disabled = false;
      const label = facing === 'user' ? 'frontal' : 'traseira';
      setStatus(`✅ Câmera ${label} ativa. Clique em Gravar.`);
      return { ok: true };
    } catch (err) {
      console.error('initCamera error:', err);
      setStatus('');
      return { ok: false, err };
    }
  }

  /* ── Botão "Liberar câmera" (overlay) ─────────────────────── */
  btnAllow.addEventListener('click', async () => {
    hideError();
    btnAllow.textContent = '⏳ Aguarde...';
    btnAllow.disabled = true;

    // Verifica suporte
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showError('⚠️ Este navegador não suporta acesso à câmera. Use o Chrome atualizado.');
      btnAllow.textContent = '📷 Liberar câmera e microfone';
      btnAllow.disabled = false;
      return;
    }

    const result = await initCamera(facingMode);

    if (result.ok) {
      overlay.style.display = 'none';
    } else {
      showError(errMsg(result.err));
      btnAllow.textContent = '🔄 Tentar novamente';
      btnAllow.disabled = false;
    }
  });

  /* ── Alternar câmera ──────────────────────────────────────── */
  btnCamera.addEventListener('click', async () => {
    if (recording) return;
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    btnCamera.textContent = facingMode === 'user' ? '📷 Frontal' : '📷 Traseira';
    btnCamera.disabled = true;
    btnRecord.disabled = true;
    setStatus('🔄 Alternando câmera...');
    const result = await initCamera(facingMode);
    if (!result.ok) setStatus('⚠️ ' + errMsg(result.err));
  });

  /* ── MediaRecorder ────────────────────────────────────────── */
  function pickMimeType() {
    const candidates = [
      'video/mp4;codecs=h264,aac',
      'video/mp4',
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm',
    ];
    return candidates.find(t => {
      try { return MediaRecorder.isTypeSupported(t); } catch { return false; }
    }) || '';
  }

  function startRecording() {
    chunks = [];
    lastBlob = null;
    const mimeType = pickMimeType();
    console.log('mimeType escolhido:', mimeType);

    try {
      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    } catch (e) {
      console.warn('MediaRecorder com mimeType falhou, tentando sem:', e);
      mediaRecorder = new MediaRecorder(stream);
    }

    mediaRecorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const mime = mediaRecorder.mimeType || 'video/webm';
      lastBlob = new Blob(chunks, { type: mime });
      btnSave.style.display = 'flex';
      setStatus('✅ Gravação concluída! Clique em Salvar.');
    };

    mediaRecorder.start(250); // coleta chunks a cada 250 ms
    recording = true;
    elapsed = 0;
    updateTimer();
    timerInterval = setInterval(updateTimer, 1000);

    btnRecord.textContent = '⏹ Parar';
    btnRecord.classList.add('recording');
    btnCamera.disabled = true;
    btnSave.style.display = 'none';
    recInd.classList.add('active');
    setStatus('🔴 Gravando...');
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    clearInterval(timerInterval);
    recording = false;
    btnRecord.textContent = '⏺ Gravar';
    btnRecord.classList.remove('recording');
    btnCamera.disabled = false;
    recInd.classList.remove('active');
  }

  function updateTimer() {
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
    elapsed++;
  }

  btnRecord.addEventListener('click', () => {
    if (!stream) return;
    recording ? stopRecording() : startRecording();
  });

  /* ── Salvar ───────────────────────────────────────────────── */
  btnSave.addEventListener('click', () => {
    if (!lastBlob) return;
    const ext  = lastBlob.type.includes('mp4') ? 'mp4' : 'webm';
    const name = `gravacao_${Date.now()}.${ext}`;
    const url  = URL.createObjectURL(lastBlob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);

    btnSave.style.display = 'none';
    lastBlob = null;
    chunks = [];
    setStatus(`💾 Salvo como "${name}". Pronto para nova gravação.`);
  });

})();
</script>
</body>
</html>
